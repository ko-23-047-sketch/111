<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Персональный Чат</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        
        /* Профиль сверху */
        .header-profile { width: 100%; max-width: 600px; background: white; padding: 15px; display: flex; align-items: center; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-radius: 0 0 15px 15px; box-sizing: border-box; }
        .header-profile img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #007bff; }
        .logout-link { color: #ff4757; cursor: pointer; font-size: 13px; text-decoration: underline; }

        /* Контейнер чата */
        .chat-main { width: 100%; max-width: 600px; flex-grow: 1; display: flex; flex-direction: column; background: white; margin: 15px 0; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }

        /* Список контактов */
        .contacts-bar { padding: 15px; border-bottom: 1px solid #eee; display: flex; gap: 15px; overflow-x: auto; }
        .contact { display: flex; flex-direction: column; align-items: center; cursor: pointer; min-width: 70px; }
        .contact img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid transparent; transition: 0.3s; }
        .contact.active img { border-color: #007bff; transform: scale(1.1); }
        .contact span { font-size: 12px; margin-top: 5px; font-weight: 500; }

        /* Область сообщений */
        #chatWindow { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #ffffff; }
        .msg { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 14px; line-height: 1.4; position: relative; }
        .msg.sent { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 4px; }
        .msg.received { align-self: flex-start; background: #e4e6eb; color: #050505; border-bottom-left-radius: 4px; }
        .msg-time { font-size: 10px; opacity: 0.7; margin-top: 5px; display: block; text-align: right; }

        /* Поле ввода */
        .input-bar { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; }
        .input-bar input { flex-grow: 1; padding: 12px 18px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        .input-bar button { background: #007bff; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .input-bar button:hover { background: #0056b3; }

        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f5; display: flex; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <button id="loginBtn" style="width: auto; padding: 15px 40px;">Войти через Google</button>
    </div>

    <div class="header-profile" id="headerProfile" style="display: none;">
        <img id="myPhoto" src="" alt="">
        <div style="flex-grow: 1;">
            <div id="myName" style="font-weight: bold;">Имя...</div>
            <div class="logout-link" id="logoutBtn">Выйти</div>
        </div>
    </div>

    <div class="chat-main">
        <div class="contacts-bar">
            <div class="contact active" onclick="selectPartner('almas@test.com', 'Алмас', 'https://ui-avatars.com/api/?name=Almas&background=0D8ABC&color=fff')">
                <img src="https://ui-avatars.com/api/?name=Almas&background=0D8ABC&color=fff" alt="">
                <span>Алмас</span>
            </div>
            </div>

        <div style="padding: 10px 20px; background: #f8f9fa; border-bottom: 1px solid #eee; font-size: 13px; color: #666;">
            Чат с: <b id="chatWithLabel">Алмас</b>
        </div>

        <div id="chatWindow"></div>

        <div class="input-bar">
            <input type="text" id="msgInput" placeholder="Ваше сообщение...">
            <button id="sendBtn">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-2Hb0MjPsAetnKBlY_UkQl1XGKPuTnn0",
            authDomain: "project-3757587931652284127.firebaseapp.com", 
            projectId: "project-3757587931652284127",
            storageBucket: "project-3757587931652284127.firebasestorage.app",
            messagingSenderId: "995476911676",
            appId: "1:995476911676:web:9501c84ce29b17b2de3539"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let currentPartnerEmail = 'almas@test.com'; // По умолчанию переписка с Алмасом

        // --- АВТОРИЗАЦИЯ ---
        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('headerProfile').style.display = 'flex';
                document.getElementById('myName').innerText = user.displayName;
                document.getElementById('myPhoto').src = user.photoURL;
                startChatListener();
            } else {
                document.getElementById('loginOverlay').style.display = 'flex';
                document.getElementById('headerProfile').style.display = 'none';
            }
        });

        // --- ЛОГИКА ЧАТА ---
        window.selectPartner = (email, name, photo) => {
            currentPartnerEmail = email;
            document.getElementById('chatWithLabel').innerText = name;
            startChatListener();
        };

        document.getElementById('sendBtn').onclick = async () => {
            const text = document.getElementById('msgInput').value.trim();
            if (!text || !auth.currentUser) return;

            try {
                await addDoc(collection(db, "messages"), {
                    sender: auth.currentUser.email,
                    receiver: currentPartnerEmail,
                    content: text,
                    timestamp: serverTimestamp()
                });
                document.getElementById('msgInput').value = "";
            } catch (e) {
                console.error("Ошибка отправки:", e);
            }
        };

        let unsubscribe = null;
        function startChatListener() {
            if (unsubscribe) unsubscribe();

            // Слушаем все сообщения, отсортированные по времени
            const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));

            unsubscribe = onSnapshot(q, (snapshot) => {
                const chatWindow = document.getElementById('chatWindow');
                chatWindow.innerHTML = "";

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    
                    // Фильтр: показываем только сообщения между мной и текущим собеседником
                    const isMyMessage = data.sender === auth.currentUser.email && data.receiver === currentPartnerEmail;
                    const isPartnerMessage = data.sender === currentPartnerEmail && data.receiver === auth.currentUser.email;

                    if (isMyMessage || isPartnerMessage) {
                        const time = data.timestamp ? data.timestamp.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "...";
                        const msgDiv = document.createElement('div');
                        msgDiv.className = `msg ${isMyMessage ? 'sent' : 'received'}`;
                        msgDiv.innerHTML = `${data.content} <span class="msg-time">${time}</span>`;
                        chatWindow.appendChild(msgDiv);
                    }
                });
                chatWindow.scrollTop = chatWindow.scrollHeight; // Скролл вниз
            });
        }
    </script>
</body>
</html>

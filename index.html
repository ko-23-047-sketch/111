<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS Project</title>
    <style>
        /* Стили как на финальном скриншоте */
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h3 { margin-top: 0; font-size: 18px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; background: #fff; }
        button#mainBtn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button#mainBtn:hover { background: #0056b3; }
        
        /* Стили карточек постов */
        .post { background: #fff; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 12px; width: 100%; max-width: 500px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .like-btn { cursor: pointer; border: none; background: #f8f9fa; padding: 5px 12px; border-radius: 20px; font-size: 14px; transition: 0.2s; margin-top: 10px; display: flex; align-items: center; gap: 5px; }
        .like-btn:hover { background: #e2e6ea; }
        .time { font-size: 11px; color: #999; position: absolute; top: 15px; right: 15px; }
        b { font-size: 16px; color: #333; }
        p { margin: 5px 0; color: #666; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h3>Панель управления данными</h3>
    <input type="text" id="name" placeholder="Имя профиля">
    <input type="email" id="email" placeholder="Рабочий Email">
    <button id="mainBtn">Опубликовать в облако</button>
</div>

<div id="feed" style="width: 100%; max-width: 500px;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { 
        getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
        serverTimestamp, updateDoc, doc, increment 
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    // Твоя конфигурация
    const firebaseConfig = {
        apiKey: "AIzaSyC-2Hb0MjPsAetnKBlY_UkQl1XGKPuTnn0",
        authDomain: "project-3757587931652284127.firebaseapp.com",
        projectId: "project-3757587931652284127",
        storageBucket: "project-3757587931652284127.firebasestorage.app",
        messagingSenderId: "995476911676",
        appId: "1:995476911676:web:9501c84ce29b17b2de3539",
        measurementId: "G-CVLXCYHE1B"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Функция для лайков
    window.processLike = async (id) => {
        const docRef = doc(db, "requests", id);
        try {
            await updateDoc(docRef, { likes: increment(1) });
        } catch (e) {
            console.error("Ошибка обновления лайка:", e.message);
        }
    };

    // Кнопка публикации
    document.getElementById('mainBtn').onclick = async () => {
        const nameVal = document.getElementById('name').value;
        const emailVal = document.getElementById('email').value;

        try {
            await addDoc(collection(db, "requests"), {
                name: nameVal,
                email: emailVal,
                likes: 0,
                timestamp: serverTimestamp()
            });
            document.getElementById('name').value = "";
            document.getElementById('email').value = "";
        } catch (e) {
            // Если сработают правила безопасности (имя < 3 символов или нет @)
            alert("Ошибка безопасности: Данные отклонены сервером. Проверьте длину имени (>2) и наличие @ в email.");
            console.error(e);
        }
    };

    // Отображение данных в реальном времени
    const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        snapshot.forEach((doc) => {
            const data = doc.data();
            const time = data.timestamp ? data.timestamp.toDate().toLocaleTimeString() : "...";
            feed.innerHTML += `
                <div class="post">
                    <span class="time">${time}</span>
                    <b>${data.name}</b>
                    <p>${data.email}</p>
                    <button class="like-btn" onclick="processLike('${doc.id}')">
                        <span style="color:#f4b400">👍</span> ${data.likes || 0}
                    </button>
                </div>`;
        });
    });
</script>
</body>
</html>

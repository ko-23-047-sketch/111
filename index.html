<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS Project - Extended</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button#mainBtn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; }
        
        .post { background: #fff; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 12px; width: 100%; max-width: 500px; position: relative; }
        .actions { display: flex; gap: 10px; margin-top: 10px; }
        .like-btn { cursor: pointer; border: none; background: #f8f9fa; padding: 5px 12px; border-radius: 20px; }
        /* Стиль для кнопки удаления */
        .delete-btn { cursor: pointer; border: none; background: #fff1f1; color: #d93025; padding: 5px 12px; border-radius: 20px; font-size: 13px; }
        .delete-btn:hover { background: #ffdfdf; }
        .time { font-size: 11px; color: #999; position: absolute; top: 15px; right: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h3>Панель управления данными</h3>
    <input type="text" id="name" placeholder="Имя профиля">
    <input type="email" id="email" placeholder="Рабочий Email">
    <button id="mainBtn">Опубликовать в облако</button>
</div>

<div id="feed" style="width: 100%; max-width: 500px;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { 
        getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
        serverTimestamp, updateDoc, doc, increment, deleteDoc 
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC-2Hb0MjPsAetnKBlY_UkQl1XGKPuTnn0",
        authDomain: "project-3757587931652284127.firebaseapp.com",
        projectId: "project-3757587931652284127",
        storageBucket: "project-3757587931652284127.firebasestorage.app",
        messagingSenderId: "995476911676",
        appId: "1:995476911676:web:9501c84ce29b17b2de3539",
        measurementId: "G-CVLXCYHE1B"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 1. ФУНКЦИЯ ЛАЙКА (UPDATE)
    window.processLike = async (id) => {
        const docRef = doc(db, "requests", id);
        try { await updateDoc(docRef, { likes: increment(1) }); } 
        catch (e) { console.error(e); }
    };

    // 2. НОВАЯ ФУНКЦИЯ УДАЛЕНИЯ (DELETE)
    window.deleteRequest = async (id) => {
        if (confirm("Вы уверены, что хотите удалить эту запись?")) {
            try {
                await deleteDoc(doc(db, "requests", id));
            } catch (e) {
                alert("Ошибка удаления: Проверьте правила (Rules) в Firebase.");
            }
        }
    };

    // 3. ФУНКЦИЯ СОЗДАНИЯ (CREATE)
    document.getElementById('mainBtn').onclick = async () => {
        const nameVal = document.getElementById('name').value;
        const emailVal = document.getElementById('email').value;
        try {
            await addDoc(collection(db, "requests"), {
                name: nameVal,
                email: emailVal,
                likes: 0,
                timestamp: serverTimestamp()
            });
            document.getElementById('name').value = "";
            document.getElementById('email').value = "";
        } catch (e) {
            alert("Ошибка безопасности!");
        }
    };

    // 4. ОТОБРАЖЕНИЕ (READ)
    const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        snapshot.forEach((doc) => {
            const data = doc.data();
            const time = data.timestamp ? data.timestamp.toDate().toLocaleTimeString() : "...";
            feed.innerHTML += `
                <div class="post">
                    <span class="time">${time}</span>
                    <b>${data.name}</b>
                    <p>${data.email}</p>
                    <div class="actions">
                        <button class="like-btn" onclick="processLike('${doc.id}')">👍 ${data.likes || 0}</button>
                        <button class="delete-btn" onclick="deleteRequest('${doc.id}')">Удалить</button>
                    </div>
                </div>`;
        });
    });
</script>
</body>
</html>
